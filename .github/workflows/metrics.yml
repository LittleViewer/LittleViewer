name: Metrics
on:
  # Se met à jour toutes les 12 heures
  schedule: [{cron: "0 */12 * * *"}]
  # Permet de lancer la mise à jour manuellement
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Configuration du layout
          user: LittleViewer
          template: classic
          base: header, activity, community, repositories, metadata
          
          # Plugin pour voir l'activité des commits en détail
          plugin_lines: yes
